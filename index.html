<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portfolio — Product Photography</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&family=Montserrat:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #fafafa;
      --text: #111;
      --muted: #888;
      --border: #e0e0e0;
      --accent: #111;
      --gap: 12px;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Montserrat', sans-serif;
      font-weight: 300;
      -webkit-font-smoothing: antialiased;
      user-select: none;
    }

    /* ── 헤더 */
    header {
      padding: 56px 40px 24px;
      max-width: 1400px;
      margin: 0 auto;
    }

    .header-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 32px;
    }

    .header-left { flex: 1; }
    .header-left h1 { margin-bottom: 0; }

    .header-contact {
      text-align: right;
      padding-top: 4px;
    }

    .contact-heading {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(18px, 2.5vw, 28px);
      font-weight: 300;
      letter-spacing: 2px;
      color: var(--text);
      margin-bottom: 14px;
    }

    .contact-item {
      display: flex;
      align-items: baseline;
      justify-content: flex-end;
      gap: 10px;
      margin-bottom: 7px;
    }

    .contact-label {
      font-size: 9px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--muted);
    }

    .contact-value {
      font-size: 12px;
      letter-spacing: 0.5px;
      color: #333;
      font-weight: 300;
      user-select: text;
    }

    .contact-value a {
      color: #333;
      text-decoration: none;
      transition: color 0.2s;
    }

    .contact-value a:hover { color: var(--accent); }

    @media (max-width: 640px) {
      .header-top { flex-direction: column; gap: 28px; }
      .header-contact { text-align: left; }
      .contact-item { justify-content: flex-start; }
    }

    .label {
      font-size: 11px;
      letter-spacing: 5px;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(36px, 6vw, 64px);
      font-weight: 300;
      line-height: 1.05;
      letter-spacing: -1px;
      color: var(--text);
      margin-bottom: 32px;
    }

    .divider {
      border: none;
      border-top: 1px solid var(--border);
      margin-bottom: 20px;
    }

    /* ── 필터 */
    .filters {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 8px;
    }

    .filter-btn {
      font-family: 'Montserrat', sans-serif;
      font-size: 11px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      padding: 7px 16px;
      border: 1px solid #ccc;
      background: transparent;
      color: #555;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .filter-btn:hover { border-color: var(--accent); color: var(--accent); }
    .filter-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

    /* ── 메인 */
    main {
      max-width: 1400px;
      margin: 0 auto;
      padding: 16px 40px 0;
    }

    /* ── 제품 섹션 */
    .product-section {
      margin-bottom: 60px;
      transition: opacity 0.3s ease;
    }

    .product-section.hidden { display: none; }

    .section-label {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
    }

    .section-num {
      font-size: 10px;
      letter-spacing: 3px;
      color: var(--muted);
    }

    .section-name {
      font-size: 10px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #333;
    }

    .section-line {
      flex: 1;
      height: 1px;
      background: #e8e8e8;
    }

    /* ── 그리드 */
    .grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: var(--gap);
    }

    @media (max-width: 900px) { .grid { grid-template-columns: repeat(3, 1fr); } }
    @media (max-width: 600px) { .grid { grid-template-columns: repeat(2, 1fr); } }

    /* ── 이미지 타일 */
    .tile {
      position: relative;
      aspect-ratio: 4 / 5;
      overflow: hidden;
      background: #eee;
      cursor: pointer;
    }

    .tile img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      loading: lazy;
      transition: transform 0.4s ease, opacity 0.3s ease;
      opacity: 0;
    }

    .tile img.loaded { opacity: 1; }
    .tile:hover img { transform: scale(1.03); }

    .tile::after {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0);
      transition: background 0.3s ease;
      pointer-events: none;
    }

    .tile:hover::after { background: rgba(0,0,0,0.04); }

    /* 로딩 플레이스홀더 */
    .tile-placeholder {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #ccc;
      font-size: 24px;
      transition: opacity 0.3s;
    }

    .tile img.loaded + .tile-placeholder,
    .tile-placeholder.hidden { opacity: 0; pointer-events: none; }

    /* ── 라이트박스 */
    #lightbox {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.93);
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s ease;
    }

    #lightbox.open {
      opacity: 1;
      pointer-events: all;
    }

    /* before/after 컨테이너 */
    #lb-content {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 2px;
      max-width: 92vw;
      max-height: 88vh;
      transition: opacity 0.2s ease;
    }

    #lb-content.fade { opacity: 0; }

    .lb-panel {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      max-height: 88vh;
    }

    .lb-panel img {
      max-width: 44vw;
      max-height: 80vh;
      object-fit: contain;
      display: block;
      user-select: none;
    }

    .lb-tag {
      font-family: 'Montserrat', sans-serif;
      font-size: 9px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.4);
    }

    .lb-divider {
      width: 1px;
      height: 60vh;
      background: rgba(255,255,255,0.12);
      flex-shrink: 0;
    }

    /* 모바일: 세로 배치 */
    @media (max-width: 640px) {
      #lb-content {
        flex-direction: column;
        gap: 12px;
        max-width: 90vw;
        max-height: 90vh;
        overflow-y: auto;
      }
      .lb-panel img {
        max-width: 86vw;
        max-height: 40vh;
      }
      .lb-divider { width: 60vw; height: 1px; }
    }

    /* 라이트박스 버튼 공통 */
    .lb-btn {
      position: absolute;
      background: rgba(255,255,255,0.08);
      border: none;
      color: #fff;
      cursor: pointer;
      border-radius: 50%;
      width: 44px;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
      font-size: 18px;
    }

    .lb-btn:hover { background: rgba(255,255,255,0.18); }

    #lb-close { top: 20px; right: 20px; font-size: 20px; }
    #lb-prev   { left: 16px; }
    #lb-next   { right: 16px; }

    #lb-prev.hidden, #lb-next.hidden { opacity: 0; pointer-events: none; }

    #lb-counter {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 11px;
      letter-spacing: 2px;
      color: rgba(255,255,255,0.5);
    }

    /* ── 푸터 */
    footer {
      max-width: 1400px;
      margin: 0 auto;
      padding: 40px 40px;
      border-top: 1px solid var(--border);
      text-align: center;
    }

    footer p {
      font-size: 10px;
      letter-spacing: 2px;
      color: var(--muted);
      text-transform: uppercase;
    }

    /* ── 모바일 패딩 */
    @media (max-width: 600px) {
      header { padding: 40px 20px 20px; }
      main   { padding: 12px 20px 0; }
      footer { padding: 32px 20px; }
      #lb-prev { left: 8px; }
      #lb-next { right: 8px; }
    }
  </style>
</head>
<body>

<!-- ── 헤더 -->
<header>
  <div class="header-top">
    <div class="header-left">
      <p class="label">Portfolio</p>
      <h1>Product<br>Photography</h1>
    </div>
    <div class="header-contact">
      <p class="contact-heading">Contact</p>
      <div class="contact-item">
        <span class="contact-label">Gmail</span>
        <span class="contact-value">jjw42u@gmail.com</span>
      </div>
      <div class="contact-item">
        <span class="contact-label">Phone</span>
        <span class="contact-value">010-4056-4823</span>
      </div>
    </div>
  </div>
  <hr class="divider" />
  <div class="filters" id="filters">
    <button class="filter-btn active" data-filter="all">All</button>
    <!-- JS가 제품 그룹별 버튼 자동 생성 -->
  </div>
</header>

<!-- ── 갤러리 -->
<main id="gallery"></main>

<!-- ── 라이트박스 -->
<div id="lightbox" role="dialog" aria-modal="true">
  <button class="lb-btn" id="lb-close" aria-label="닫기">&#x2715;</button>
  <button class="lb-btn" id="lb-prev"  aria-label="이전">&#8249;</button>

  <div id="lb-content">
    <div class="lb-panel">
      <img id="lb-img-before" src="" alt="보정 전" />
      <span class="lb-tag">Before</span>
    </div>
    <div class="lb-divider"></div>
    <div class="lb-panel">
      <img id="lb-img-after" src="" alt="보정 후" />
      <span class="lb-tag">After</span>
    </div>
  </div>

  <button class="lb-btn" id="lb-next"  aria-label="다음">&#8250;</button>
  <div id="lb-counter"></div>
</div>

<footer>
  <p>Product Photography Portfolio</p>
  <p style="margin-top: 8px;">© 2026 jjw42u@gmail.com · All rights reserved</p>
</footer>

<script>
// ═══════════════════════════════════════════
//  ✏️  여기만 수정하세요
// ═══════════════════════════════════════════
const PRODUCTS = [
  { id: 0, name: '화장품', count: 1 },
  { id: 1, name: '캔 음료', count: 3 },
  { id: 2, name: '캔 뱃지', count: 2 },
  { id: 3, name: '잉크', count: 2 },
  { id: 4, name: '향수', count: 2 },
];

// 이미지 경로 규칙: images/{id}-{n}.webp
function imgPath(id, n) {
  return `images/${id}-${n}.webp`;
}
// ═══════════════════════════════════════════

// ── 갤러리 빌드
const gallery  = document.getElementById('gallery');
const filters  = document.getElementById('filters');

PRODUCTS.forEach(p => {
  // 필터 버튼
  const btn = document.createElement('button');
  btn.className = 'filter-btn';
  btn.dataset.filter = p.id;
  btn.textContent = p.name;
  filters.appendChild(btn);

  // 섹션
  const section = document.createElement('section');
  section.className = 'product-section';
  section.dataset.group = p.id;

  const num = String(p.id).padStart(2, '0');
  section.innerHTML = `
    <div class="section-label">
      <span class="section-num">${num}</span>
      <span class="section-name">${p.name}</span>
      <span class="section-line"></span>
    </div>
    <div class="grid"></div>
  `;

  const grid = section.querySelector('.grid');

  for (let n = 1; n <= p.count; n++) {
    const path = imgPath(p.id, n);

    const tile = document.createElement('div');
    tile.className = 'tile';
    tile.dataset.group = p.id;
    tile.dataset.index = n - 1;

    const img = document.createElement('img');
    img.src = path;
    img.alt = `${p.name} — ${n}`;
    img.loading = 'eager';
    img.decoding = 'sync';

    // 로드 완료 시 페이드인
    img.addEventListener('load', () => img.classList.add('loaded'));
    img.addEventListener('error', () => {
      ph.innerHTML = '✕';
    });

    const ph = document.createElement('div');
    ph.className = 'tile-placeholder';
    ph.innerHTML = `<svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#ccc" stroke-width="1.2"><rect x="3" y="3" width="18" height="18" rx="1"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>`;

    tile.appendChild(img);
    tile.appendChild(ph);

    // 클릭 → 라이트박스
    tile.addEventListener('click', () => openLightbox(p.id, n - 1));

    grid.appendChild(tile);
  }

  gallery.appendChild(section);
});

// ── 필터
filters.addEventListener('click', e => {
  const btn = e.target.closest('.filter-btn');
  if (!btn) return;

  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');

  const filter = btn.dataset.filter;
  document.querySelectorAll('.product-section').forEach(sec => {
    sec.classList.toggle('hidden', filter !== 'all' && sec.dataset.group !== filter);
  });
});

// ── 라이트박스
const lightbox    = document.getElementById('lightbox');
const lbContent   = document.getElementById('lb-content');
const lbImgBefore = document.getElementById('lb-img-before');
const lbImgAfter  = document.getElementById('lb-img-after');
const lbCounter   = document.getElementById('lb-counter');
const lbPrev      = document.getElementById('lb-prev');
const lbNext      = document.getElementById('lb-next');
const lbClose     = document.getElementById('lb-close');

let currentGroup = null;
let currentIndex = 0;

function getGroup(id) { return PRODUCTS.find(p => p.id === id); }

function imgPathAfter(id, n)  { return `images/${id}-${n}.webp`; }
function imgPathBefore(id, n) { return `images/${id}-${n}a.webp`; }

function openLightbox(groupId, index) {
  currentGroup = groupId;
  currentIndex = index;
  showImage();
  lightbox.classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeLightbox() {
  lightbox.classList.remove('open');
  document.body.style.overflow = '';
  lbImgBefore.src = '';
  lbImgAfter.src  = '';
}

function showImage() {
  const group = getGroup(currentGroup);
  const total = group.count;
  const n     = currentIndex + 1;

  lbContent.classList.add('fade');
  setTimeout(() => {
    lbImgBefore.src = imgPathBefore(currentGroup, n);
    lbImgAfter.src  = imgPathAfter(currentGroup, n);
    lbContent.classList.remove('fade');
  }, 150);

  lbCounter.textContent = `${n} / ${total}`;
  lbPrev.classList.toggle('hidden', currentIndex === 0);
  lbNext.classList.toggle('hidden', currentIndex === total - 1);
}

lbClose.addEventListener('click', closeLightbox);
lbPrev.addEventListener('click', () => { currentIndex--; showImage(); });
lbNext.addEventListener('click', () => { currentIndex++; showImage(); });

// 배경 클릭으로 닫기
lightbox.addEventListener('click', e => { if (e.target === lightbox) closeLightbox(); });

// 키보드
document.addEventListener('keydown', e => {
  if (!lightbox.classList.contains('open')) return;
  if (e.key === 'Escape') closeLightbox();
  if (e.key === 'ArrowLeft'  && currentIndex > 0) { currentIndex--; showImage(); }
  if (e.key === 'ArrowRight' && currentIndex < getGroup(currentGroup).count - 1) { currentIndex++; showImage(); }
});

// 모바일 스와이프
let touchStartX = 0;
lightbox.addEventListener('touchstart', e => { touchStartX = e.changedTouches[0].clientX; }, { passive: true });
lightbox.addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - touchStartX;
  if (Math.abs(dx) < 40) return;
  const group = getGroup(currentGroup);
  if (dx < 0 && currentIndex < group.count - 1) { currentIndex++; showImage(); }
  if (dx > 0 && currentIndex > 0)                { currentIndex--; showImage(); }
});
</script>
</body>
</html>
